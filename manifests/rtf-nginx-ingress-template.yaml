# rtf-alb-and-ingress.yaml
---
apiVersion: elbv2.k8s.aws/v1beta1
kind: IngressClassParams
metadata:
  name: rtf-alb-params
spec:
  scheme: internet-facing
  ipAddressType: ipv4
  # Optional: set targetType: ip or instance if needed (ip is typical for EKS + pods)
  targetType: ip
  # Optional tags example:
  # tags:
  #   - key: env
  #     value: nonprod
---
apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: rtf-alb
  # optional annotation to mark default:
  # annotations:
  #   ingressclass.kubernetes.io/is-default-class: "true"
spec:
  controller: ingress.k8s.aws/alb
  parameters:
    apiGroup: elbv2.k8s.aws
    kind: IngressClassParams
    name: rtf-alb-params
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rtf-ingress
  namespace: rtf
  labels:
    business-group: business-group-id
    environment: environment-id
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/certificate-arn: "paste ur certificate-arn"
    alb.ingress.kubernetes.io/group.name: <add group name here>
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    alb.ingress.kubernetes.io/ssl-policy: "ELBSecurityPolicy-2016-08"
spec:
  ingressClassName: rtf-alb
  rules:
    - host: "*.abc.com"
      http:
        paths:
          - pathType: Prefix
            path: /app-name
            backend:
              service:
                name: service-name
                port:
                  number: 80
