# -----------------------------------------------------------------------------
# rtf-nginx-ingress-template.yaml
# -----------------------------------------------------------------------------
# Runtime Fabric custom ingress template for NGINX Ingress Controller.
#
# Important:
# - This object is a TEMPLATE consumed by Runtime Fabric.
# - Do not change the placeholder service name/port values unless required by
#   MuleSoft documentation for your RTF version.
# - Update the host value to match your DNS strategy.
# - Runtime Fabric ingress templates use an ingressClassName with the rtf- prefix.
# -----------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rtf-nginx-ingress-template
  namespace: rtf
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  ingressClassName: rtf-nginx
  rules:
    - host: app-name.rtf.example.com
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: service-name
                port:
                  name: service-port
